<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Posted Jobs</title>
</head>
<body>

<h2>Your Posted Jobs</h2>

<table border="1">
  <tr>
    <th>Job ID</th>
    <th>Title</th>
    <th>Description</th>
  </tr>

  <tr th:each="job : ${jobs}">
    <td th:text="${job.id}"></td>
    <td th:text="${job.title}"></td>
    <td th:text="${job.description}"></td>
    <td>
      <form th:action="@{/seeApplications}">
        <input type="hidden" name="id" th:value="${job.id}">
        <button type="submit"> See Applications</button>
      </form>
    </td>
  </tr>

</table>

<br>

<a th:href="@{/recruiterDashboard}">Back to Dashboard</a>

</body>
</html>
