<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<div>
  <form th:action="@{/saveJob}" th:object="${job}" method="post">
    <label>
      <input type="hidden" th:field="*{recruiter}">
    </label>
    <label>
      Title
      <input type="text" th:field="*{title}" placeholder="Please enter the Job title">
    </label>
    <label>
      Description
      <input type="text" th:field="*{description}" placeholder="Please enter the Job description">
    </label>
    <label>
      Salary
      <input type="number" th:field="*{salary}"  placeholder="Please enter the salary">
    </label>
    <label>
      Location
      <input type="text" th:field="*{location}" placeholder="Please enter the location">
    </label>
    <label>
      Submit
      <input type="submit" placeholder="Submit">
    </label>
  </form>
</div>
</body>
</html>
