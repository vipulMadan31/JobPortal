<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Search</title>
</head>
<body>
    <form th:action="@{/seeJobs}" method="get">
      <label>
        <input type="text" name="keyword" placeholder="Please enter Job title or Location">
      </label>
      <label>
        <select name="sort">
          <option value="">Default</option>
          <option value="Salary">Sort By Salary</option>
        </select>
      </label>
      <button type="submit">Submit</button>
    </form>
</body>
</html>
